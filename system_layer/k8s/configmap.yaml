apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-digitaltwin-config
  namespace: ai-digitaltwin
data:
  NODE_ENV: "production"
  API_URL: "http://backend-service:3001/api"
  AI_ENGINE_URL: "http://ai-engine-service:8000"
  MONGODB_URI: "mongodb://mongodb-service:27017/ai-digitaltwin"
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-digitaltwin-secrets
  namespace: ai-digitaltwin
type: Opaque
stringData:
  JWT_SECRET: "your-super-secret-jwt-key-change-in-production"
  MONGO_USER: "admin"
  MONGO_PASSWORD: "password"
  GRAFANA_PASSWORD: "admin"

