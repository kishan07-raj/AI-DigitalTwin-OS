apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine-deployment
  namespace: ai-digitaltwin
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      containers:
        - name: ai-engine
          image: ai-digitaltwin-ai:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-engine-service
  namespace: ai-digitaltwin
spec:
  selector:
    app: ai-engine
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP

