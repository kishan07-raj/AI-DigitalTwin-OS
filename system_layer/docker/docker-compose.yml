version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: ai-digitaltwin-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ai-digitaltwin
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ai-digitaltwin-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ../..
      dockerfile: system_layer/docker/Dockerfile.backend
    container_name: ai-digitaltwin-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/ai-digitaltwin?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ai-digitaltwin-network

  # Frontend
  frontend:
    build:
      context: ../..
      dockerfile: system_layer/docker/Dockerfile.frontend
    container_name: ai-digitaltwin-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - ai-digitaltwin-network

  # AI Engine (FastAPI)
  ai-engine:
    build:
      context: ../..
      dockerfile: system_layer/docker/Dockerfile.ai
    container_name: ai-digitaltwin-ai
    restart: unless-stopped
    environment:
      PYTHON_ENV: production
      API_PORT: 8000
    ports:
      - "8000:8000"
    networks:
      - ai-digitaltwin-network

  # Redis (for caching and sessions)
  redis:
    image: redis:7-alpine
    container_name: ai-digitaltwin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai-digitaltwin-network
    command: redis-server --appendonly yes

  # Prometheus (monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-digitaltwin-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - ai-digitaltwin-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana (visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: ai-digitaltwin-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning
    networks:
      - ai-digitaltwin-network

volumes:
  mongodb_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  ai-digitaltwin-network:
    driver: bridge

